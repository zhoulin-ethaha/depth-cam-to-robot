<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Participant Mode</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; background: #0e0e0e; color: #d0d0d0;
    font-family: "SF Mono", "Fira Code", monospace; overflow: hidden;
  }
  body { display: flex; flex-direction: column; }

  /* 4:3 stage: the live depth feed with the number canvas on top. */
  #stage-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
  #stage { position: relative; }
  #stage img, #stage canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #stage img { object-fit: fill; user-select: none; -webkit-user-drag: none; }

  /* Participant-Mode automation status — big, top-right of the stage. */
  #status-wrap {
    position: absolute; top: 10px; right: 10px; z-index: 2;
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
    pointer-events: none;
  }
  #status-chip {
    font-size: clamp(20px, 4vw, 40px); font-weight: 700; letter-spacing: 0.5px;
    padding: 4px 14px; border-radius: 8px;
    background: rgba(0, 0, 0, 0.65); border: 2px solid #555; color: #999;
  }
  #status-msg {
    font-size: 12px; color: #ccc; background: rgba(0,0,0,0.55);
    padding: 2px 8px; border-radius: 5px; max-width: 46vw; text-align: right;
  }
  #status-msg:empty { display: none; }
  .chip-off        { border-color: #555 !important;    color: #999 !important; }
  .chip-watching   { border-color: #5599ff !important; color: #5599ff !important; }
  .chip-alerted    { border-color: #ff5544 !important; color: #ff5544 !important; }
  .chip-sensing    { border-color: #00c8ff !important; color: #00c8ff !important; }
  .chip-generating { border-color: #c084fc !important; color: #c084fc !important; }
  .chip-actuating  { border-color: #00e5a0 !important; color: #00e5a0 !important; }

  footer {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    background: #161616; border-top: 1px solid #2a2a2a;
    font-size: 11px; flex-wrap: wrap;
  }
  footer label { color: #999; white-space: nowrap; }
  footer input[type="range"] { width: 140px; accent-color: #5599ff; height: 14px; }
  #trigger {
    width: 72px; padding: 3px 6px; font: inherit; color: #e8e8e8;
    background: #101010; border: 1px solid #333; border-radius: 4px;
  }
  #trigger:focus { outline: none; border-color: #5599ff; }
  #auto-toggle {
    font: inherit; font-weight: 700; padding: 4px 14px; cursor: pointer;
    color: #999; background: #101010; border: 2px solid #555; border-radius: 5px;
  }
  #auto-toggle.on { color: #5599ff; border-color: #5599ff; background: #0d1a2e; }
  .val { color: #aaa; min-width: 52px; font-variant-numeric: tabular-nums; }
  .sep { width: 1px; height: 18px; background: #2a2a2a; }
  #note { color: #666; margin-left: auto; white-space: nowrap; }
</style>
</head>
<body>

  <div id="stage-wrap">
    <div id="stage">
      <img id="feed" src="/depth" alt="depth feed" />
      <canvas id="overlay"></canvas>
      <div id="status-wrap">
        <div id="status-chip" class="chip-off">Auto Off</div>
        <div id="status-msg"></div>
      </div>
    </div>
  </div>

  <footer>
    <button id="auto-toggle" title="Automation ON runs capture → generate → save+run from the trigger, and locks the manual buttons in Developer Mode">Auto: OFF</button>
    <label for="trigger">Trigger below</label>
    <input type="number" id="trigger" min="50" max="5000" step="10" placeholder="mm" />
    <span class="val">mm</span>
    <div class="sep"></div>
    <label for="interval">Region interval</label>
    <input type="range" id="interval" min="1" max="100" step="1" value="10" />
    <span class="val" id="interval-val">10 mm</span>
    <div class="sep"></div>
    <label for="textsize">Text size</label>
    <input type="range" id="textsize" min="8" max="36" step="1" value="13" />
    <span class="val" id="textsize-val">13 px</span>
    <span id="note">numbers = mm from camera · Auto ON + trigger = automated runs</span>
  </footer>

<script src="/static/depth_overlay.js"></script>
</body>
</html>
